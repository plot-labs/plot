spring.application.name=plot-api
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
server.address=127.0.0.1

# Generation is opt-in. Enable both Plot's gateway and Spring AI's OpenAI chat model externally.
plot.ai.enabled=false
plot.ai.provider=openai
plot.ai.timeout=45s
plot.ai.writer-temperature=0.2
plot.ai.reviewer-temperature=0.0
plot.ai.max-output-tokens=4000
plot.ai.transport-retries=1
plot.ai.schema-retries=1
plot.ai.max-model-calls=12
plot.ai.max-total-tokens=80000
plot.ai.max-run-duration=5m
spring.ai.model.chat=none
spring.ai.chat.observations.log-prompt=false
spring.ai.chat.observations.log-completion=false
spring.ai.chat.client.observations.log-prompt=false
spring.ai.chat.client.observations.log-completion=false

# GitHub App adapter is opt-in. Keep secrets out of checked-in configuration.
plot.github.enabled=false
plot.github.dev-only=true
plot.github.loopback-only=true
plot.github.state-ttl-seconds=900
plot.github.import-page-cap=20
plot.github.repository-page-cap=100
